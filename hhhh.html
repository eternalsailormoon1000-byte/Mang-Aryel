    <style>
        body {
            margin: 0;
            padding: 0;
            background: #e8e8e8;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .container {
            overflow: hidden;
            width: 80%;
            border-radius: 8px;
            background: #f4f4f4;
            padding: 20px 0;
            box-shadow: 2px 2px 4px rgba(0, 0, 0, 0.15);
			margin: 25px 130px 25px 150px;
		}

        .wrapper {
            display: grid;
            grid-auto-flow: column;
            grid-auto-columns: 12rem;
            gap: 2rem;
            animation: animate 10s linear infinite;
        }

        .wrapper img, .wrapper video {
            width: 100%;
            height: 14rem;
            object-fit: cover;
            border-radius: 8px;
            transition: transform 0.2s ease-in-out;
        }

        .wrapper:hover {
            animation-play-state: paused;
            cursor: pointer;
        }

        @keyframes animate {
            to {
                transform: translateX(calc(-5 * (12rem + 2rem)));
            }
        }

        .wrapper img:hover, .wrapper video:hover {
            transform: scale(1.1);
            cursor: pointer;
        }

        /* Modal for full size viewing */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.9);
            overflow: auto;
        }

        .modal-content {
            position: relative;
            margin: auto;
            padding: 20px;
            width: 90%;
            max-width: 1200px;
            top: 50%;
            transform: translateY(-50%);
        }

        .modal-content img, .modal-content video {
            width: 100%;
            height: auto;
            max-height: 80vh;
            object-fit: contain;
            border-radius: 8px;
        }

        .close {
            position: absolute;
            top: 10px;
            right: 25px;
            color: #fff;
            font-size: 35px;
            font-weight: bold;
            cursor: pointer;
            z-index: 1001;
        }
    </style>

<script>
const playlist = [
    { title: 'Sino Nga Ba Siya', src: 'AUDIOS/Sino Nga Ba Siya.mp3' },
	{ title: 'Not Cute Anymore', src: 'AUDIOS/Not Cute Anymore.mp3' },
    { title: 'Cosmic', src: 'AUDIOS/Cosmic.mp3' },
    { title: 'Reckless', src: 'AUDIOS/Reckless.mp3' },
    { title: 'Nandito Ako', src: 'AUDIOS/Nandito Ako.mp3' },
    { title: 'MAGO', src: 'AUDIOS/MAGO.mp3' },
    { title: 'Pag-Ibig ay Kanibalismo II', src: 'AUDIOS/Pag-Ibig ay Kanibalismo II.mp3' }	
];

let shuffledPlaylist = [];
let currentTrackIndex = 0;
let audioPlaying = false;

function initAudio() {
    shuffledPlaylist = shuffleArray([...playlist]);
    currentTrackIndex = 0;
    const player = document.getElementById('musicPlayer');
    player.src = shuffledPlaylist[0].src;
    player.addEventListener('ended', playNextTrack);
    setAudioStatus('Ready to shuffle');
}

function shuffleArray(array) {
    for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
    }
    return array;
}

function toggleAudio() {
    const player = document.getElementById('musicPlayer');
    if (!audioPlaying) {
        if (!player.src) {
            initAudio();
        }
        player.play().catch(() => {});
        audioPlaying = true;
        setAudioStatus(`Playing: ${shuffledPlaylist[currentTrackIndex].title}`);
        
        // Save audio state to sessionStorage for persistence
        sessionStorage.setItem('audioPlaying', 'true');
        sessionStorage.setItem('currentTrackIndex', currentTrackIndex);
        sessionStorage.setItem('currentTime', player.currentTime);
    } else {
        player.pause();
        audioPlaying = false;
        setAudioStatus('Paused');
        
        // Save audio state
        sessionStorage.setItem('audioPlaying', 'false');
        sessionStorage.setItem('currentTime', player.currentTime);
    }
}

function playNextTrack() {
    currentTrackIndex++;
    if (currentTrackIndex >= shuffledPlaylist.length) {
        shuffledPlaylist = shuffleArray([...playlist]);
        currentTrackIndex = 0;
    }
    const player = document.getElementById('musicPlayer');
    player.src = shuffledPlaylist[currentTrackIndex].src;
    player.play();
    setAudioStatus(`Playing: ${shuffledPlaylist[currentTrackIndex].title}`);
}

function setAudioStatus(value) {
    const status = document.getElementById('audioStatus');
    if (status) status.textContent = value;
}

function setNavbarColorFromImage() {
    const img = new Image();
    img.crossOrigin = 'anonymous';
    img.src = 'IMAGES/SARI-SARI.jpg';
    img.onload = function() {
        const canvas = document.createElement('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = img.width;
        canvas.height = img.height;
        ctx.drawImage(img, 0, 0);
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;
        let r = 0, g = 0, b = 0;
        let count = 0;
        for (let i = 0; i < data.length; i += 4) {
            r += data[i];
            g += data[i+1];
            b += data[i+2];
            count++;
        }
        r = Math.floor(r / count);
        g = Math.floor(g / count);
        b = Math.floor(b / count);
        const brightness = (r * 0.299 + g * 0.587 + b * 0.114);
        const navbar = document.querySelector('.navbar');
        navbar.style.background = `rgb(${r}, ${g}, ${b})`;
        // Adjust text color for contrast
        const textColor = brightness > 186 ? '#000' : '#fff';
        navbar.style.color = textColor;
        // Also adjust links and buttons
        const links = navbar.querySelectorAll('a');
        links.forEach(link => link.style.color = textColor);
    };
}

setNavbarColorFromImage();

// Restore audio state from sessionStorage
function restoreAudioState() {
    const savedAudioPlaying = sessionStorage.getItem('audioPlaying');
    const savedTrackIndex = sessionStorage.getItem('currentTrackIndex');
    const savedCurrentTime = sessionStorage.getItem('currentTime');
    
    if (savedAudioPlaying === 'true' && savedTrackIndex !== null) {
        initAudio();
        currentTrackIndex = parseInt(savedTrackIndex);
        const player = document.getElementById('musicPlayer');
        player.src = shuffledPlaylist[currentTrackIndex].src;
        
        // Restore current time
        if (savedCurrentTime) {
            player.currentTime = parseFloat(savedCurrentTime);
        }
        
        // Try to play the audio
        player.play().then(() => {
            audioPlaying = true;
            setAudioStatus(`Playing: ${shuffledPlaylist[currentTrackIndex].title}`);
        }).catch(() => {
            // If autoplay fails, just set the state
            audioPlaying = true;
            setAudioStatus(`Playing: ${shuffledPlaylist[currentTrackIndex].title}`);
        });
    }
}

// Restore audio state when page loads
window.addEventListener('load', restoreAudioState);

// Toggle video playback and open modal
function toggleVideoAndOpenModal(videoElement, src) {
    // Play the clicked video
    videoElement.play().catch(() => {});
    
    // Open modal with the video
    openModal('video', src);
}

// Modal functions
function openModal(type, src) {
    const modal = document.getElementById('mediaModal');
    const modalMedia = document.getElementById('modalMedia');
    
    if (type === 'video') {
        modalMedia.innerHTML = `<video controls autoplay>
            <source src="${src}" type="video/mp4">
        </video>`;
    } else {
        modalMedia.innerHTML = `<img src="${src}" alt="Full size image">`;
    }
    
    modal.style.display = 'block';
}

function closeModal() {
    const modal = document.getElementById('mediaModal');
    modal.style.display = 'none';
    
    // Stop video when closing modal
    const video = modal.querySelector('video');
    if (video) {
        video.pause();
    }
}

// Close modal when clicking outside
window.onclick = function(event) {
    const modal = document.getElementById('mediaModal');
    if (event.target === modal) {
        closeModal();
    }
}
